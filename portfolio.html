<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Past Work | Nocturne Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

/* NAVIGATION */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 60px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo img { height: 50px; transition: 0.3s ease; }
.logo img:hover { transform: scale(1.08); }

nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

nav a {
    text-decoration: none;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    transition: 0.3s;
    position: relative;
}
nav a:hover { color: #E74C3C; }
nav a::after {
    content: "";
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: #E74C3C;
    transition: 0.3s;
}
nav a:hover::after { width: 100%; }

/* HERO (matching home) */
.hero-portfolio {
    position: relative;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
}
.hero-portfolio img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(6px) brightness(0.35);
    top: 0;
    left: 0;
    z-index: 0;
}
.hero-portfolio::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(231,76,60,0.55), rgba(146,43,33,0.55));
    z-index: 1;
}
.hero-content {
    position: relative;
    z-index: 2;
}
.hero-portfolio h1 {
    font-size: 58px;
    font-weight: 800;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.5);
}
.hero-portfolio p {
    margin-top: 10px;
    font-size: 20px;
    opacity: 0.9;
}

/* FILTER BAR + ADMIN BUTTONS */
.filter-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 40px auto 20px;
    max-width: 1200px;
    padding: 0 20px;
}
.filter-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 10px 24px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.filter-btn.active, .filter-btn:hover {
    background: #E74C3C;
    border-color: #E74C3C;
}
.admin-bar {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 10px auto 30px;
}
.admin-btn {
    background: rgba(231,76,60,0.2);
    border: 1px solid #E74C3C;
    padding: 8px 20px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.admin-btn:hover {
    background: #E74C3C;
}

/* PROJECTS GRID */
.projects-grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 35px;
}
.project-card {
    background: rgba(255,255,255,0.05);
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}
.project-card:hover {
    transform: translateY(-6px);
    border-color: #E74C3C;
    box-shadow: 0 12px 30px rgba(231,76,60,0.2);
}
.project-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}
.project-details {
    padding: 1.5rem;
}
.project-cat {
    display: inline-block;
    background: rgba(231,76,60,0.2);
    color: #ffaa99;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-bottom: 12px;
}
.project-title {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 8px;
}
.project-desc {
    opacity: 0.8;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 1rem;
}
.service-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #E74C3C;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
}
.service-link:hover { gap: 10px; color: #ff7a5c; }

/* MODAL STYLES */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: #1a1a1e;
    max-width: 500px;
    width: 90%;
    padding: 30px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.modal-content h3 {
    font-size: 28px;
    margin-bottom: 20px;
}
.modal-content input, .modal-content textarea, .modal-content select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: white;
    font-size: 14px;
}
.modal-content textarea { min-height: 80px; }
.modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}
.modal-buttons button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 40px;
    font-weight: 600;
    cursor: pointer;
}
.submit-btn { background: #E74C3C; color: white; }
.cancel-btn { background: rgba(255,255,255,0.1); color: white; }

footer {
    padding: 30px;
    text-align: center;
    background: rgba(0,0,0,0.4);
    font-size: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
}

@media(max-width:768px) {
    nav { flex-direction: column; gap: 15px; padding: 20px; }
    .hero-portfolio h1 { font-size: 38px; }
    .projects-grid { padding: 0 20px 50px; gap: 20px; }
}
</style>
</head>
<body>

<nav>
    <div class="logo"><a href="index.html"><img src="NFI.webp" alt="NFI Logo"></a></div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="portfolio.html" style="color:#E74C3C;">Portfolio</a></li>
        <li><a href="terms.html">Terms</a></li>
        <li><a href="https://discord.gg/GHYsrwvaN7" target="_blank">Discord</a></li>
    </ul>
</nav>

<div class="hero-portfolio">
    <img src="official_banner.webp" alt="Portfolio Background">
    <div class="hero-content">
        <h1>✦ Past Work Showcase ✦</h1>
        <p>Explore real projects from each service category</p>
    </div>
</div>

<div class="filter-bar" id="filterBar"></div>
<div class="admin-bar">
    <button class="admin-btn" id="addProjectBtn">➕ Add new project (Discord image)</button>
    <button class="admin-btn" id="resetDefaultBtn">⟳ Reset to default</button>
</div>
<div id="projectsGrid" class="projects-grid"></div>

<footer>© 2026 NFI's Custom. All rights reserved.</footer>

<!-- Modal for adding project -->
<div id="projectModal" class="modal">
    <div class="modal-content">
        <h3>Add portfolio item</h3>
        <input type="text" id="projectImgUrl" placeholder="Discord image URL (direct link)" value="">
        <input type="text" id="projectTitle" placeholder="Project title">
        <textarea id="projectDesc" placeholder="Short description"></textarea>
        <input type="text" id="projectCategory" placeholder="Category (e.g., Scripting, GFX)" list="categorySuggestions">
        <datalist id="categorySuggestions">
            <option>Scripting</option><option>Discord Services</option><option>Graphics & GFX</option>
            <option>User Interface (UI)</option><option>Clothing</option><option>Modeling & Building</option>
        </datalist>
        <div class="modal-buttons">
            <button class="submit-btn" id="saveProjectBtn">Save project</button>
            <button class="cancel-btn" id="closeModalBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ---------- DEFAULT PORTFOLIO DATA (same as before) ----------
    const DEFAULT_CATEGORIES = {
        "Scripting": {
            works: [
                { img: "https://picsum.photos/id/26/500/350", title: "Admin Control Panel", desc: "Full moderation suite with logs" },
                { img: "https://picsum.photos/id/106/500/350", title: "Economy Simulator", desc: "Trading & banking core" },
                { img: "https://picsum.photos/id/0/500/350", title: "Anti-Cheat Core", desc: "Real-time protection AI" }
            ]
        },
        "Discord Services": {
            works: [
                { img: "https://picsum.photos/id/96/500/350", title: "Moderation Dashboard", desc: "Logs & warnings" },
                { img: "https://picsum.photos/id/219/500/350", title: "Ticket System Pro", desc: "Support tickets" },
                { img: "https://picsum.photos/id/169/500/350", title: "Giveaway Manager", desc: "Auto‑giveaways" }
            ]
        },
        "Graphics & GFX": {
            works: [
                { img: "https://picsum.photos/id/104/500/350", title: "Neon Kingdom", desc: "Logo & identity pack" },
                { img: "https://picsum.photos/id/21/500/350", title: "YT Thumbnail Pack", desc: "High CTR designs" }
            ]
        },
        "User Interface (UI)": {
            works: [
                { img: "https://picsum.photos/id/91/500/350", title: "Cyberpunk HUD", desc: "Futuristic UI" },
                { img: "https://picsum.photos/id/77/500/350", title: "Inventory System", desc: "Drag & drop" }
            ]
        },
        "Clothing": {
            works: [
                { img: "https://picsum.photos/id/82/500/350", title: "Urban Streetwear", desc: "T-shirt design" },
                { img: "https://picsum.photos/id/145/500/350", title: "Fantasy Hoodie", desc: "Embroidered look" }
            ]
        },
        "Modeling & Building": {
            works: [
                { img: "https://picsum.photos/id/11/500/350", title: "Gothic Mansion", desc: "Interior & exterior" },
                { img: "https://picsum.photos/id/33/500/350", title: "Neon City Plaza", desc: "Urban modular" }
            ]
        }
    };

    // Storage key
    const STORAGE_KEY = "nocturne_portfolio_data";

    // Load or initialize portfolio data
    function loadPortfolioData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch(e) { console.warn(e); }
        }
        // deep copy default
        return JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    }

    let portfolioDB = loadPortfolioData();
    let allProjects = [];
    let currentFilter = "all";

    function rebuildAllProjects() {
        allProjects = [];
        for (let cat in portfolioDB) {
            portfolioDB[cat].works.forEach(w => {
                allProjects.push({ ...w, category: cat });
            });
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(portfolioDB));
    }

    // Render projects based on currentFilter
    function renderProjects() {
        const grid = document.getElementById('projectsGrid');
        const filtered = currentFilter === "all" ? allProjects : allProjects.filter(p => p.category === currentFilter);
        grid.innerHTML = '';
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px;">✨ No projects in this category. Add some using the button above!</div>';
            return;
        }
        filtered.forEach(proj => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `
                <img class="project-img" src="${proj.img}" alt="${proj.title}" loading="lazy" onerror="this.src='https://picsum.photos/id/1/500/350'">
                <div class="project-details">
                    <span class="project-cat">${escapeHtml(proj.category)}</span>
                    <div class="project-title">${escapeHtml(proj.title)}</div>
                    <div class="project-desc">${escapeHtml(proj.desc)}</div>
                    <a href="services.html" class="service-link">↗ related service · ${escapeHtml(proj.category)}</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function buildFilters() {
        const bar = document.getElementById('filterBar');
        const categories = Object.keys(portfolioDB);
        bar.innerHTML = `<button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">All work</button>`;
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentFilter === cat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.dataset.filter = cat;
            btn.addEventListener('click', () => {
                currentFilter = cat;
                rebuildAllProjects();
                renderProjects();
                buildFilters(); // refresh active state
            });
            bar.appendChild(btn);
        });
        const allBtn = bar.querySelector('[data-filter="all"]');
        if (allBtn) {
            allBtn.addEventListener('click', () => {
                currentFilter = "all";
                rebuildAllProjects();
                renderProjects();
                buildFilters();
            });
        }
    }

    // Reset to default (clear localStorage and reload)
    function resetToDefault() {
        if (confirm("⚠️ This will delete all your added projects and restore the default portfolio. Continue?")) {
            localStorage.removeItem(STORAGE_KEY);
            portfolioDB = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
            rebuildAllProjects();
            currentFilter = "all";
            renderProjects();
            buildFilters();
        }
    }

    // Add new project using Discord image URL
    function addNewProject(imgUrl, title, desc, category) {
        if (!imgUrl || !title || !desc || !category) {
            alert("Please fill all fields (image URL, title, description, category).");
            return false;
        }
        // simple URL validation
        if (!imgUrl.startsWith("http")) {
            alert("Image URL must start with http:// or https:// (Discord CDN works perfectly).");
            return false;
        }
        const newWork = { img: imgUrl, title: title, desc: desc };
        if (!portfolioDB[category]) {
            portfolioDB[category] = { works: [] };
        }
        portfolioDB[category].works.push(newWork);
        saveToLocalStorage();
        rebuildAllProjects();
        if (currentFilter === "all" || currentFilter === category) {
            renderProjects();
        }
        buildFilters(); // update filter bar with new category
        return true;
    }

    // Modal logic
    const modal = document.getElementById('projectModal');
    const addBtn = document.getElementById('addProjectBtn');
    const resetBtn = document.getElementById('resetDefaultBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const saveBtn = document.getElementById('saveProjectBtn');

    addBtn.onclick = () => { modal.style.display = 'flex'; };
    closeBtn.onclick = () => { modal.style.display = 'none'; };
    resetBtn.onclick = resetToDefault;
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    saveBtn.onclick = () => {
        const imgUrl = document.getElementById('projectImgUrl').value.trim();
        const title = document.getElementById('projectTitle').value.trim();
        const desc = document.getElementById('projectDesc').value.trim();
        let category = document.getElementById('projectCategory').value.trim();
        if (!category) category = "Other";
        if (addNewProject(imgUrl, title, desc, category)) {
            modal.style.display = 'none';
            document.getElementById('projectImgUrl').value = '';
            document.getElementById('projectTitle').value = '';
            document.getElementById('projectDesc').value = '';
            document.getElementById('projectCategory').value = '';
        }
    };

    // Initial load
    rebuildAllProjects();
    renderProjects();
    buildFilters();
</script>
</body>
</html>
