<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Past Work | Nocturne Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 60px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo img { height: 50px; transition: 0.3s ease; }
.logo img:hover { transform: scale(1.08); }

nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

nav a {
    text-decoration: none;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    transition: 0.3s;
    position: relative;
}
nav a:hover { color: #E74C3C; }
nav a::after {
    content: "";
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: #E74C3C;
    transition: 0.3s;
}
nav a:hover::after { width: 100%; }

.hero-portfolio {
    position: relative;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
}
.hero-portfolio img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(6px) brightness(0.35);
    top: 0;
    left: 0;
    z-index: 0;
}
.hero-portfolio::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(231,76,60,0.55), rgba(146,43,33,0.55));
    z-index: 1;
}
.hero-content {
    position: relative;
    z-index: 2;
}
.hero-portfolio h1 {
    font-size: 58px;
    font-weight: 800;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.5);
}
.hero-portfolio p {
    margin-top: 10px;
    font-size: 20px;
    opacity: 0.9;
}

.filter-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 40px auto 40px;
    max-width: 1200px;
    padding: 0 20px;
}
.filter-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 10px 24px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.filter-btn.active, .filter-btn:hover {
    background: #E74C3C;
    border-color: #E74C3C;
}

.projects-grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 35px;
}
.project-card {
    background: rgba(255,255,255,0.05);
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
    cursor: pointer;
}
.project-card:hover {
    transform: translateY(-6px);
    border-color: #E74C3C;
    box-shadow: 0 12px 30px rgba(231,76,60,0.2);
}
.project-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
}
.project-details {
    padding: 1.5rem;
}
.project-cat {
    display: inline-block;
    background: rgba(231,76,60,0.2);
    color: #ffaa99;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-bottom: 12px;
}
.project-title {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 8px;
}
.project-desc {
    opacity: 0.8;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 0.75rem;
}
.project-madeby {
    font-size: 0.8rem;
    color: #E74C3C;
    margin-bottom: 1rem;
    font-weight: 500;
    letter-spacing: 0.3px;
}
.service-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #E74C3C;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
}
.service-link:hover { gap: 10px; color: #ff7a5c; }

/* Lightbox Modal */
.lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}
.lightbox.active {
    display: flex;
}
.lightbox img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
.lightbox-close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
.lightbox-close:hover {
    color: #E74C3C;
}

footer {
    padding: 30px;
    text-align: center;
    background: rgba(0,0,0,0.4);
    font-size: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
}

@media(max-width:768px) {
    nav { flex-direction: column; gap: 15px; padding: 20px; }
    .hero-portfolio h1 { font-size: 38px; }
    .projects-grid { padding: 0 20px 50px; gap: 20px; }
}
</style>
</head>
<body>

<nav>
    <div class="logo"><a href="index.html"><img src="NFI.webp" alt="NFI Logo"></a></div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="portfolio.html" style="color:#E74C3C;">Portfolio</a></li>
        <li><a href="terms.html">Terms</a></li>
        <li><a href="https://discord.gg/GHYsrwvaN7" target="_blank">Discord</a></li>
    </ul>
</nav>

<div class="hero-portfolio">
    <img src="official_banner.webp" alt="Portfolio Background">
    <div class="hero-content">
        <h1>✦ Past Work Showcase ✦</h1>
        <p>Explore real projects from each service category</p>
    </div>
</div>

<div class="filter-bar" id="filterBar"></div>
<div id="projectsGrid" class="projects-grid"></div>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" alt="Full size view">
</div>

<footer>© 2026 NFI's Custom. All rights reserved.</footer>

<script>
    // ============================================================
    // EDIT YOUR PORTFOLIO ITEMS HERE – PASTE DISCORD IMAGE URLs
    // ============================================================
    const portfolioDB = {
        "Scripting": {
            works: [
                { img: "https://picsum.photos/id/26/500/350", title: "Admin Control Panel", desc: "Full moderation suite with logs", madeBy: "Nocturne Designs" },
                { img: "https://picsum.photos/id/106/500/350", title: "Economy Simulator", desc: "Trading & banking core", madeBy: "NFI" },
                { img: "https://picsum.photos/id/0/500/350", title: "Anti-Cheat Core", desc: "Real-time protection AI", madeBy: "Alex" }
            ]
        },
        "Discord Services": {
            works: [
                { img: "https://picsum.photos/id/96/500/350", title: "Moderation Dashboard", desc: "Logs & warnings", madeBy: "Nocturne Designs" },
                { img: "https://picsum.photos/id/219/500/350", title: "Ticket System Pro", desc: "Support tickets", madeBy: "NFI" },
                { img: "https://picsum.photos/id/169/500/350", title: "Giveaway Manager", desc: "Auto‑giveaways", madeBy: "Community Team" }
            ]
        },
        "Graphics": {
            works: [
                { img: "https://cdn.discordapp.com/attachments/1410930493448523796/1492334451613765792/Main_Poster.png", title: "Nocturn Designs", desc: "Banner & identity pack", madeBy: "Zhar1f09" },
                { img: "https://picsum.photos/id/21/500/350", title: "YT Thumbnail Pack", desc: "High CTR designs", madeBy: "GFX Studio" }
            ]
        },
        "User Interface (UI)": {
            works: [
                { img: "https://picsum.photos/id/91/500/350", title: "Cyberpunk HUD", desc: "Futuristic UI", madeBy: "Nocturne Designs" },
                { img: "https://picsum.photos/id/77/500/350", title: "Inventory System", desc: "Drag & drop", madeBy: "UI Master" }
            ]
        },
        "Clothing": {
            works: [
                { img: "https://picsum.photos/id/82/500/350", title: "Urban Streetwear", desc: "T-shirt design", madeBy: "Fashion Lab" },
                { img: "https://picsum.photos/id/145/500/350", title: "Fantasy Hoodie", desc: "Embroidered look", madeBy: "Nocturne Designs" }
            ]
        },
        "Modeling & Building": {
            works: [
                { img: "https://picsum.photos/id/11/500/350", title: "Gothic Mansion", desc: "Interior & exterior", madeBy: "Build Team" },
                { img: "https://picsum.photos/id/33/500/350", title: "Neon City Plaza", desc: "Urban modular", madeBy: "Nocturne Designs" }
            ]
        }
    };
    // ============================================================
    // DO NOT EDIT BELOW THIS LINE
    // ============================================================

    let allProjects = [];
    let currentFilter = "all";

    function rebuildAllProjects() {
        allProjects = [];
        for (let cat in portfolioDB) {
            portfolioDB[cat].works.forEach(w => {
                allProjects.push({ ...w, category: cat, madeBy: w.madeBy || "Anonymous" });
            });
        }
    }

    function openLightbox(imgSrc) {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        lightboxImg.src = imgSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Close lightbox on ESC key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeLightbox();
        }
    });

    function renderProjects() {
        const grid = document.getElementById('projectsGrid');
        const filtered = currentFilter === "all" ? allProjects : allProjects.filter(p => p.category === currentFilter);
        grid.innerHTML = '';
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px;">✨ No projects in this category yet. Check back soon!</div>';
            return;
        }
        filtered.forEach(proj => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `
                <img class="project-img" src="${escapeHtml(proj.img)}" alt="${escapeHtml(proj.title)}" loading="lazy" onerror="this.style.display='none'">
                <div class="project-details">
                    <span class="project-cat">${escapeHtml(proj.category)}</span>
                    <div class="project-title">${escapeHtml(proj.title)}</div>
                    <div class="project-desc">${escapeHtml(proj.desc)}</div>
                    <div class="project-madeby">🎨 Made by: ${escapeHtml(proj.madeBy)}</div>
                    <a href="services.html" class="service-link">↗ related service · ${escapeHtml(proj.category)}</a>
                </div>
            `;
            // Add click event to the image for lightbox
            const img = card.querySelector('.project-img');
            if (img) {
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openLightbox(proj.img);
                });
                img.style.cursor = 'pointer';
            }
            grid.appendChild(card);
        });
    }

    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        });
    }

    function buildFilters() {
        const bar = document.getElementById('filterBar');
        const categories = Object.keys(portfolioDB);
        bar.innerHTML = `<button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">All work</button>`;
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentFilter === cat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.dataset.filter = cat;
            btn.addEventListener('click', () => {
                currentFilter = cat;
                renderProjects();
                buildFilters();
            });
            bar.appendChild(btn);
        });
        const allBtn = bar.querySelector('[data-filter="all"]');
        if (allBtn) {
            allBtn.addEventListener('click', () => {
                currentFilter = "all";
                renderProjects();
                buildFilters();
            });
        }
    }

    rebuildAllProjects();
    renderProjects();
    buildFilters();
</script>
</body>
</html>
